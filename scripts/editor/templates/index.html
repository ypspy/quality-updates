<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Quality Updates Editor</title>
  <link rel="icon" href="/favicon.ico" type="image/svg+xml">
  <link rel="stylesheet" href="/static/editor.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div id="header-left">
      <label>파일:
        <select id="file-select"><option value="">선택...</option></select>
      </label>
      <span id="dl-folder-display"></span>
      <button id="btn-change-folder">폴더 변경</button>
      <button id="btn-clear-downloads">다운로드 비우기</button>
    </div>
    <div id="header-center">
      전체 <span id="cnt-total">0</span> |
      요약 필요 <span id="cnt-needs">0</span> |
      스킵 <span id="cnt-skip">0</span> |
      미결정 <span id="cnt-undecided">0</span> |
      완료 <span id="cnt-done">0</span>
    </div>
    <div id="header-right">
      <button id="btn-save">저장</button>
      <button id="btn-export-md" title="현재 sidecar 상태를 .md 본문 주석으로 반영">본문 반영</button>
      <button id="btn-import-md" title=".md 본문 주석 상태를 sidecar로 가져오기">본문에서 가져오기</button>
    </div>
  </header>

  <!-- Main: split pane -->
  <div id="main">
    <div id="left-panel">
      <table id="link-table">
        <thead>
          <tr>
            <th colspan="5" class="link-table-head-cell">
              <div class="link-row-stack link-row-stack--head">
                <div class="link-row-line1">
                  <div class="cell-date">날짜</div>
                  <div class="cell-title">제목</div>
                  <div class="cell-agency">기관</div>
                  <div class="cell-state">상태</div>
                </div>
                <div class="link-row-line2 link-row-line2--head">SOURCE</div>
              </div>
            </th>
          </tr>
        </thead>
        <tbody id="link-tbody"></tbody>
      </table>
    </div>
    <div id="divider"></div>
    <div id="right-panel">
      <div id="iframe-container">
        <!-- Preview docs: script/exec blocked by /api/* CSP + sanitize; no iframe sandbox (avoids about:blank + sandbox warnings). -->
        <iframe id="preview-iframe" src="about:blank"></iframe>
        <div id="iframe-fallback" style="display:none">
          <p>이 사이트는 분할 화면을 지원하지 않습니다.</p>
          <a id="fallback-link" href="#" target="_blank" rel="noopener noreferrer">새 탭에서 열기 →</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/editor.js"></script>
</body>
</html>
